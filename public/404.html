<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>Axis Training Systems</title>
    <script type="text/javascript">
      // Single Page App – GitHub Pages redirect
      // Technique from https://github.com/rafgraph/spa-github-pages
      // pathSegmentsToKeep = 1  →  keeps the /axis-training-systems-website/ repo prefix
      var pathSegmentsToKeep = 1;
      var l = window.location;
      l.replace(
        l.protocol + '//' + l.host + l.pathname.split('/').slice(0, 1 + pathSegmentsToKeep).join('/') + '/?/' +
        l.pathname.slice(1).split('/').slice(pathSegmentsToKeep).join('/').replace(/&/g, '~and~') +
        (l.search ? '&' + l.search.slice(1).replace(/&/g, '~and~') : '') +
        l.hash
      );
    </script>
  </head>
</html>
